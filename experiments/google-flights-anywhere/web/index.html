<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flights for Flaneurs</title>
    <link
      rel="stylesheet"
      href="/vendor/maplibre-gl/maplibre-gl.css"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <form id="search-form" class="controls">
          <div class="brand">
            <p>Flights for Flaneurs</p>
            <h1>The weekend escape board</h1>
            <span>No fixed destination. Only flights that fit.</span>
          </div>

          <label>
            Origin
            <input
              id="origin"
              name="origin"
              value="Amsterdam"
              list="origin-options"
              autocomplete="off"
            />
            <datalist id="origin-options">
              <option value="Amsterdam"></option>
              <option value="Eindhoven"></option>
              <option value="Rotterdam"></option>
              <option value="Düsseldorf"></option>
              <option value="Cologne"></option>
              <option value="Brussels"></option>
              <option value="Charleroi"></option>
              <option value="London"></option>
              <option value="Paris"></option>
              <option value="Milan"></option>
              <option value="AMS"></option>
              <option value="EIN"></option>
              <option value="RTM"></option>
              <option value="DUS"></option>
              <option value="CGN"></option>
              <option value="BRU"></option>
              <option value="CRL"></option>
              <option value="LON"></option>
              <option value="PAR"></option>
              <option value="MIL"></option>
            </datalist>
          </label>

          <label>
            Departure
            <input id="departureDate" name="departureDate" type="date" />
          </label>

          <label>
            Return
            <input id="returnDate" name="returnDate" type="date" />
          </label>

          <label>
            Stops
            <select id="maxStops" name="maxStops">
              <option value="0">Non-stop only</option>
              <option value="1" selected>One stop or fewer</option>
              <option value="2">Two stops or fewer</option>
            </select>
          </label>

          <label>
            Sort
            <select id="sort" name="sort">
              <option value="price" selected>Cheapest first</option>
              <option value="duration">Shortest first</option>
              <option value="page">Google Explore order</option>
            </select>
          </label>

          <label>
            Max flight time
            <select id="maxDurationMinutes" name="maxDurationMinutes">
              <option value="0" selected>Any duration</option>
              <option value="120">2 hours or less</option>
              <option value="180">3 hours or less</option>
              <option value="240">4 hours or less</option>
              <option value="360">6 hours or less</option>
            </select>
          </label>

          <label>
            Leave after
            <input id="outboundAfter" name="outboundAfter" type="time" value="12:00" />
          </label>

          <label>
            Back before
            <input id="returnBefore" name="returnBefore" type="time" value="22:00" />
          </label>

          <label>
            Results
            <input id="limit" name="limit" type="number" min="3" max="50" value="50" />
          </label>

          <label>
            Options per city
            <select id="optionsPerDestination" name="optionsPerDestination">
              <option value="1" selected>Best option</option>
              <option value="2">Up to 2</option>
              <option value="3">Up to 3</option>
              <option value="5">Up to 5</option>
            </select>
          </label>

          <label>
            Route fallback
            <select id="routeSource" name="routeSource">
              <option value="flightsfrom" selected>FlightsFrom</option>
              <option value="none">Off</option>
            </select>
          </label>

          <button id="submit" type="submit">Search anywhere</button>
          <p id="status" class="status">Flaneur engine idle.</p>
        </form>

        <section class="results">
          <div class="toolbar">
            <div>
              <p id="eyebrow">No search yet</p>
              <h2 id="result-title">Pick a window, then disappear.</h2>
            </div>
            <a id="source-link" href="#" target="_blank" rel="noreferrer" hidden>Open flights</a>
          </div>

          <div id="map" class="map" aria-label="Destination map"></div>

          <div id="grid" class="grid empty">
            <p>The board will fill when the search finds a city worth chasing.</p>
          </div>
        </section>
      </section>
    </main>

    <script src="/vendor/maplibre-gl/maplibre-gl.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
